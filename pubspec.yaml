name: snore_clinics
description: SnoreClinics AI — Monitor, analyze & improve your sleep with AI-driven insights.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Audio recording
  record: ^6.2.0

  # Audio playback (relaxation sounds)
  just_audio: ^0.9.38

  # HTTP
  http: ^1.2.0

  # File picker for audio files
  file_picker: ^8.0.3

  # FFT / amplitude analysis
  fftea: ^1.2.0

  # Charts for sleep visualization
  fl_chart: ^0.68.0

  # Local notifications (bedtime reminders)
  flutter_local_notifications: ^18.0.1

  # Overnight background execution

  # Gemini AI
  google_generative_ai: ^0.4.6

  # Unique IDs
  uuid: ^4.4.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Persist data
  shared_preferences: ^2.2.3

  # Confetti on milestones
  confetti: ^0.7.0

  # Premium typography
  google_fonts: ^6.2.1

  # Lottie animations
  lottie: ^3.1.2

  # Path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 24

flutter_native_splash:
  color: "#0F1120"
  image: "assets/images/app_icon.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
